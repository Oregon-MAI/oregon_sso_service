name: 'SSO'
services:

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: oregon-jaeger
    ports:
      - "16686:16686"
      - "16687:16687"
      - "4317:4317"
      - "4318:4318"

  postgres-sso-service:
    image: postgres:latest
    restart: unless-stopped
    ports:
      - "5433:5433"
    environment:
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres
    command: [ "postgres", "-p", "5433" ]

  sso:
    build: .
    restart: unless-stopped
    ports:
      - "8001:8001"
    depends_on:
      - postgres-sso-service
      - jaeger
    environment:
    - JAEGER=jaeger:4317